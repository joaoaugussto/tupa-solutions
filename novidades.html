<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novidades — Tupã Solutions</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="bg-fixed" style="background-image:url('assets/images/bg-pattern.png')"></div>
<div class="bg-overlay"></div>

<nav>
  <div class="logo" style="gap:10px">
    <img src="assets/images/logo.png" alt="Tupã Solutions" style="width:58px;height:58px;object-fit:contain;filter:drop-shadow(0 0 4px rgba(212,175,55,0.25))" />
    <span style="font-family:Cinzel,serif;font-size:17px;font-weight:700;color:#D4AF37;letter-spacing:0.07em;white-space:nowrap">Tupã Solutions</span>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Início</a></li>
    <li><a href="services.html">Apps</a></li>
    <li><a href="novidades.html" class="active">Novidades</a></li>
  </ul>
  <a href="https://wa.me/5517996433083" target="_blank" class="nav-cta">Contato</a>
</nav>

<section class="sv-hero">
  <div class="sv-hero-inner">
    <div class="sv-badge">Novidades</div>
    <h1>Atualizações dos <span class="sv-gold">nossos</span> apps</h1>
    <p class="sv-sub">Fique por dentro de tudo que está sendo melhorado e lançado.</p>
  </div>
</section>

<section class="section" style="padding-top:1rem">
  <div id="updatesContainer"></div>
</section>

<footer>
  <div class="fc">© 2025 Tupã Solutions. Todos os direitos reservados.</div>
  <div class="fl"><a href="index.html">Início</a><a href="services.html">Apps</a><a href="#">Contato</a></div>
</footer>

<script>
const updates = [];

// Exemplo de como adicionar uma atualização futuramente:
// { app: 'mechup', titulo: 'Nova funcionalidade X', data: '28/05/2025', descricao: 'Descrição da atualização.', versao: 'v1.2.0' }

const appMeta = {
  mechup:   { label: 'MechUp',   logo: 'assets/images/logo-mechup.png',   tagClass: 'app-tag--purple' },
  scissors: { label: 'Scissors', logo: 'assets/images/logo-scissors.png', tagClass: 'app-tag--gold'   }
};

const container = document.getElementById('updatesContainer');

if (updates.length === 0) {
  container.innerHTML = `
    <div class="empty-state">
      <svg class="empty-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 8C23.163 8 16 15.163 16 24v12l-4 6h40l-4-6V24C48 15.163 40.837 8 32 8z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M28 50a4 4 0 008 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div class="empty-title">Nenhuma atualização no momento</div>
      <p class="empty-sub">Em breve traremos novidades dos nossos apps. Volte em breve!</p>
      <a href="services.html" class="btn-cta">Ver nossos apps →</a>
    </div>
  `;
} else {
  container.innerHTML = `<div class="updates-grid">${updates.map(u => {
    const meta = appMeta[u.app];
    return `
      <div class="update-card">
        <div class="update-card-head">
          <div class="update-card-logo">
            <img class="update-logo" src="${meta.logo}" alt="${meta.label}">
            <span class="app-tag ${meta.tagClass}">${meta.label}</span>
          </div>
          <span class="update-version">${u.versao}</span>
        </div>
        <div class="update-title">${u.titulo}</div>
        <div class="update-date">${u.data}</div>
        <p class="update-desc">${u.descricao}</p>
      </div>
    `;
  }).join('')}</div>`;
}
</script>

</body>
</html>
